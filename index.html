<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitCal AI</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-panel">
            <h1>FitCal AI ✨</h1>
            <p>วิเคราะห์แคลอรี่อัจฉริยะ</p>
        </header>

        <section class="glass-panel profile-section">
            <h2>ตั้งค่าร่างกายของคุณ</h2>
            <div class="input-group">
                <input type="number" id="age" placeholder="อายุ (ปี)">
                <input type="number" id="weight" placeholder="น้ำหนัก (กก.)">
                <input type="number" id="height" placeholder="ส่วนสูง (ซม.)">
            </div>
            <button onclick="calculateTDEE()" class="btn-primary">คำนวณเป้าหมาย</button>
            <div id="tdee-result" class="hidden">
                <p>เป้าหมายของคุณคือ: <strong id="tdee-value">0</strong> kcal/วัน</p>
            </div>
        </section>

        <section class="glass-panel dashboard">
            <h2>สถานะวันนี้</h2>
            <div class="circle-progress">
                <div class="circle-inner">
                    <h3 id="calories-eaten">0</h3>
                    <p>kcal ที่กิน</p>
                </div>
            </div>
            <div class="emoji-status" id="emoji-display">
                <span class="emoji">🤔</span>
                <p id="emoji-text">รอข้อมูล...</p>
            </div>
        </section>

        <section class="glass-panel add-food">
            <h2>เพิ่มมื้ออาหาร</h2>
            <div class="input-group">
                <input type="text" id="food-name" placeholder="พิมพ์ชื่อเมนู (เช่น ข้าวกะเพราหมูสับ)" style="width: 100%;">
            </div>
            <div class="action-buttons">
                <button onclick="addFoodByName()" class="btn-secondary">วิเคราะห์จากชื่อ</button>
                <button onclick="simulateAIScan()" class="btn-ai">📸 สแกนด้วย AI</button>
            </div>
        </section>

        <section class="glass-panel history-section">
            <h2>ประวัติวันนี้ (กดเพื่อดูส่วนประกอบ)</h2>
            <ul id="food-list" class="food-list">
                </ul>
            <button onclick="clearData()" class="btn-danger">ล้างข้อมูลทั้งหมด</button>
        </section>
    </div>

    <div id="ingredient-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h3 id="modal-title">รายละเอียดเมนู</h3>
            <ul id="modal-ingredients" class="ingredient-list">
                </ul>
            <div class="modal-total">
                <span>รวมทั้งหมด:</span>
                <strong id="modal-total-cal">0 kcal</strong>
            </div>
            <button onclick="closeModal()" class="btn-primary mt-15">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
